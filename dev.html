<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev by Russell</title>
    <link rel="stylesheet" href="./resources/css/dev.css">
</head>
<body>
<h3>Skeuomorphic Button</h3>
<button class="skeuomorphic-button" id="youtubeButton" title="Leaves Webpage and Goes to My Youtube Channel">Goes to My Youtube Channel</button><br>

<h3>Simple Hover Button</h3>

<button class ="hover-button" title="Ishkur's Guide to ELectronic Music!">Goes to the best website ever made!</button>


<nav class="bottom-nav">
    <a href="./index.html" title="Back to Home">Home</a>
</nav>

<script>
    const button = document.getElementById('youtubeButton');
    
    button.addEventListener('click', function() {
        window.location.href = 'https://youtube.com/@TnRinVegas';
    });

    // Fix: Changed 'cont' to 'const'
    const button2 = document.querySelector('.hover-button');
    button2.addEventListener('click', function() {
        window.location.href = 'https://music.ishkur.com/';
    });
</script>

</body>
</html>
