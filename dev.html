<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="./resources/css/dev.css">

<body>
<h3>Skeuomorphic Button</h3>
<button class="skeuomorphic-button" id="youtubeButton" title="Leaves Webpage and Goes to My Youtube Channel">Goes to My Youtube Channel</button>

<nav class="bottom-nav">
    <a href="./index.html" title="Back to Home">Home</a>
</nav>

<script>
    const button = document.getElementById('youtubeButton');
    
    button.addEventListener('click', function() {
        window.location.href = 'https://youtube.com/@TnRinVegas';
    });
</script>

</body>
